name: Build Test PR

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 8, 11, 17, 21 ]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
        cache: maven
        server-id: central
    - name: Build with Maven
      run: |
        mvn --no-transfer-progress -B verify --file pom.xml
